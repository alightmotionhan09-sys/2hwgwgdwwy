<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ module.name }} — Module Viewer</title>
  <meta property="og:title"       content="{{ module.name }}"/>
  <meta property="og:description" content="Path: {{ module.path }} · Sent: {{ module.sent }}"/>
  <meta property="og:type"        content="website"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #07070f;
      --surface:  #0e0e1c;
      --surface2: #13131f;
      --border:   #1e1e3a;
      --accent:   #5b7fff;
      --accent2:  #a78bfa;
      --green:    #34d399;
      --yellow:   #fbbf24;
      --text:     #e2e8ff;
      --muted:    #4a4a72;
      --mono:     'JetBrains Mono', monospace;
      --display:  'Syne', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2; pointer-events: none; z-index: 0;
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 10;
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,15,0.9); backdrop-filter: blur(14px);
    }
    .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }
    .logo-text { font-family: var(--display); font-size: 15px; font-weight: 800; color: var(--text); }
    .logo-text span { color: var(--accent); }
    .header-right { display: flex; gap: 10px; align-items: center; }

    .btn {
      padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-family: var(--mono);
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.13s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover            { border-color: var(--accent); color: var(--accent); background: rgba(91,127,255,0.08); }
    .btn.green:hover      { border-color: var(--green);  color: var(--green);  background: rgba(52,211,153,0.08); }
    .btn.yellow:hover     { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,0.08); }

    /* META BAR */
    .meta-bar {
      position: relative; z-index: 1;
      max-width: 960px; margin: 32px auto 0; padding: 0 24px;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .module-title {
      font-family: var(--display);
      font-size: 28px; font-weight: 800;
      color: var(--text); margin-bottom: 10px;
    }
    .module-title span { color: var(--accent); }

    .meta-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .chip {
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      font-size: 11px; color: var(--muted);
    }
    .chip strong { color: var(--text); }

    .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

    /* CODE BLOCK */
    .code-wrap {
      position: relative; z-index: 1;
      max-width: 960px; margin: 0 auto 60px; padding: 0 24px;
      animation: fadeUp 0.4s 0.1s ease both;
    }

    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2); border: 1px solid var(--border);
      border-bottom: none; border-radius: 10px 10px 0 0;
      padding: 10px 16px;
    }

    .code-lang { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    .line-count { font-size: 11px; color: var(--muted); }

    .code-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0 0 10px 10px;
      overflow: auto;
      max-height: 70vh;
    }

    .code-body pre {
      padding: 20px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.75;
      color: #c9d1f0;
      white-space: pre;
      tab-size: 4;
    }

    /* Syntax highlight — minimal */
    .kw  { color: #89b4fa; }  /* keywords */
    .str { color: #a6e3a1; }  /* strings */
    .cmt { color: #585b70; font-style: italic; }  /* comments */
    .num { color: #fab387; }  /* numbers */
    .fn  { color: #cba6f7; }  /* functions */

    /* LINE NUMBERS */
    .code-table { display: flex; }
    .line-nums {
      padding: 20px 12px 20px 16px;
      color: var(--muted);
      font-size: 13px; line-height: 1.75;
      text-align: right;
      user-select: none;
      border-right: 1px solid var(--border);
      min-width: 48px;
      white-space: pre;
    }
    .code-content { padding: 20px; flex: 1; overflow-x: auto; white-space: pre; font-size: 13px; line-height: 1.75; color: #c9d1f0; tab-size: 4; }

    /* TOAST */
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 12px; color: var(--green); z-index: 300; opacity: 0; transform: translateY(8px); transition: all 0.22s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 640px) {
      header { padding: 12px 16px; }
      .meta-bar, .code-wrap { padding: 0 14px; }
      .module-title { font-size: 20px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-dot"></div>
    <div class="logo-text">Module<span>Viewer</span></div>
  </a>
  <div class="header-right">
    <a class="btn" href="/">← Back</a>
    <button class="btn green" onclick="downloadFile()">⬇ Download</button>
    <button class="btn" onclick="copyCode()">Copy Code</button>
  </div>
</header>

<div class="meta-bar">
  <div class="module-title">
    <span>{{ module.name }}</span>.lua
  </div>
  <div class="meta-chips">
    <div class="chip"><strong>Path</strong> &nbsp;{{ module.path or '—' }}</div>
    <div class="chip"><strong>Sent</strong> &nbsp;{{ module.sent or '—' }}</div>
    <div class="chip"><strong>File</strong> &nbsp;{{ filename }}</div>
    <div class="chip" id="chip-lines">— lines</div>
  </div>
  <div class="action-row">
    <button class="btn green"  onclick="downloadFile()">⬇ Download .lua</button>
    <button class="btn"        onclick="copyCode()">📋 Copy Code</button>
    <button class="btn yellow" onclick="copyRawLink()">⎘ Copy Raw Link</button>
    <a      class="btn"        href="/share/{{ filename }}" target="_blank">📄 View Raw</a>
  </div>
</div>

<div class="code-wrap">
  <div class="code-header">
    <span class="code-lang">Lua · ModuleScript</span>
    <span class="line-count" id="lc">— lines</span>
  </div>
  <div class="code-body">
    <div class="code-table">
      <div class="line-nums" id="line-nums"></div>
      <div class="code-content" id="code-content"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Raw code injected safely via JSON
  const rawCode = {{ module.code | tojson }};
  const filename = {{ filename | tojson }};

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  function highlight(code) {
    let s = escHtml(code);
    // Comments
    s = s.replace(/(--[^\n]*)/g, '<span class="cmt">$1</span>');
    // Strings
    s = s.replace(/(&quot;[^&]*?&quot;|&#39;[^&#]*?&#39;)/g, '<span class="str">$1</span>');
    // Keywords
    const kws = ['\\blocal\\b','\\bfunction\\b','\\bend\\b','\\bif\\b','\\bthen\\b',
                 '\\belse\\b','\\belseif\\b','\\breturn\\b','\\bfor\\b','\\bin\\b',
                 '\\bdo\\b','\\bwhile\\b','\\brepeat\\b','\\buntil\\b','\\bnot\\b',
                 '\\band\\b','\\bor\\b','\\bnil\\b','\\btrue\\b','\\bfalse\\b'];
    kws.forEach(k => {
      s = s.replace(new RegExp(k,'g'), '<span class="kw">$&</span>');
    });
    // Numbers
    s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
    return s;
  }

  function render() {
    const lines = rawCode.split('\n');
    const count = lines.length;

    document.getElementById('chip-lines').innerHTML =
      '<strong>' + count + '</strong> lines';
    document.getElementById('lc').textContent = count + ' lines';

    // Line numbers
    let nums = '';
    for (let i = 1; i <= count; i++) nums += i + '\n';
    document.getElementById('line-nums').textContent = nums;

    // Code with highlight
    document.getElementById('code-content').innerHTML = highlight(rawCode);
  }

  render();

  function copyCode() {
    navigator.clipboard.writeText(rawCode).then(() => toast('Code copied!'));
  }

  function downloadFile() {
    window.location.href = '/download/' + encodeURIComponent(filename);
  }

  function copyRawLink() {
    const url = window.location.origin + '/share/' + encodeURIComponent(filename);
    navigator.clipboard.writeText(url).then(() => toast('Raw link copied!'));
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
